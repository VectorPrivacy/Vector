repository: https://github.com/VectorPrivacy/Vector
match: Vector\.apk$
name: Vector
description: |
    Privacy by Principle. No KYC, no metadata, no compromises.

    - End-to-end encrypted DMs using NIP-17
    - Scalable encrypted group chats using the Marmot protocol (MLS)
    - Voice messaging
    - Private local AI for multilingual translations
    - Zero metadata leakage
    - Integrated WebXDC mini-app store (Nexus)
    - Mentions, reactions, emoji shortcodes, image spoilers, and rich link previews
summary: A decentralized, privacy-focused community messenger with zero metadata leakage
